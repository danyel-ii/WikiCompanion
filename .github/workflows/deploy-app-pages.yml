name: Deploy App Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-app
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated manifest exists
        run: |
          test -f content/generated/tools-manifest.json
          test -f content/generated/tools-editorial-manifest.json

      - name: Build Expo web app
        run: npm run build:web

      - name: Build admin web app
        run: npm run build:admin:web

      - name: Merge admin web into Pages artifact
        run: |
          mkdir -p dist/admin
          cp -R apps/admin-web/dist/. dist/admin/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload app artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy app to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
