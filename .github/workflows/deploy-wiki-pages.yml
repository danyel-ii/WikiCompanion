name: Deploy Wiki Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-wiki
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build wiki site
        run: npm run wiki:site

      - name: Checkout target wiki repo
        uses: actions/checkout@v5
        with:
          repository: danyel-ii/cyber-research-wiki
          token: ${{ secrets.WIKI_PAGES_DEPLOY_TOKEN }}
          path: .wiki-publish
          persist-credentials: false

      - name: Sync wiki build into target repo
        run: |
          find .wiki-publish -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R site/wiki-build/. .wiki-publish/

      - name: Commit and push wiki update
        env:
          DEPLOY_TOKEN: ${{ secrets.WIKI_PAGES_DEPLOY_TOKEN }}
        run: |
          cd .wiki-publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/danyel-ii/cyber-research-wiki.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish"
            exit 0
          fi
          git commit -m "Deploy wiki from WikiCompanion"
          git push origin HEAD:main
